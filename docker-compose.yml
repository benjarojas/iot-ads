services:

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TF_VARIANT: ${TF_VARIANT:-cpu}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - ./ml_models:/app/ml_models
      - ./replay_datasets:/app/replay_datasets
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mqtt-ingest:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TF_VARIANT: ${TF_VARIANT:-cpu}
    command: python -m app.workers.mqtt_ingest
    restart: unless-stopped
    env_file: .env.docker
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started

  inference-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TF_VARIANT: ${TF_VARIANT:-cpu}
    command: python -m app.workers.inference_worker
    restart: unless-stopped
    env_file: .env.docker
    # For GPU, add the override file: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
    volumes:
      - ./ml_models:/app/ml_models
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  training-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TF_VARIANT: ${TF_VARIANT:-cpu}
    command: python -m app.workers.training_worker
    restart: unless-stopped
    env_file: .env.docker
    # For GPU, add the override file: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
    volumes:
      - ./ml_models:/app/ml_models
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  replay-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TF_VARIANT: ${TF_VARIANT:-cpu}
    command: python -m app.workers.replay_worker
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - ./replay_datasets:/app/replay_datasets
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-net
    depends_on:
      api:
        condition: service_healthy

networks:
  app-net:
    driver: bridge

volumes:
  postgres-data:
  mosquitto-data:
